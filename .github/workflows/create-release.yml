name: Create Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        options:
          - minor_beta
          - major_beta
          - patch
          - minor
          - major
        required: true

jobs:
  get-version:
    name: "Get Version"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.fetch_version.outputs.version }}
      is-beta: ${{ steps.fetch_version.outputs.is-beta }}
      branch: ${{ steps.set_branch.outputs.result }}
    steps:
      - name: Fetch Version From API
        uses: Macro-Deck-App/Actions/fetch-version@c998023b25eb64f93f0b8a5644e6887d6ef075ad
        id: fetch_version
        with:
          release-type: ${{ inputs.release-type }}
  
      - name: Set branch name
        id: set_branch
        run: |
            if [[ "${{ steps.fetch_version.outputs.is-beta }}" == "true" ]]; then
              echo "::set-output name=result::main"
            else
              echo "::set-output name=result::production"
            fi
    
  bump-version:
    name: "Bump Version"
    runs-on: ubuntu-latest
    needs: [get-version]
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ needs.get-version.outputs.branch }}
          
      - name: Update CSProj Version
        run: |
          sed -i 's/<Version>.*<\/Version>/<Version>${{ needs.get-version.outputs.version }}<\/Version>/' ./src/MacroDeck/MacroDeck.csproj
          git add ./src/MacroDeck/MacroDeck.csproj
          
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@3ea6ae190baf489ba007f7c92608f33ce20ef04a
        with:
          commit_message: Bump Version to ${{ needs.get-version.outputs.version }}
    
  release-github:
    name: "Release GitHub"
    runs-on: ubuntu-latest
    needs: [get-version, bump-version]
    
    steps:
      - name: "Create Release"
        uses: Macro-Deck-App/Actions/create-github-release@c998023b25eb64f93f0b8a5644e6887d6ef075ad
        id: create_release
        with:
          github-token: "${{ secrets.PAT }}"
          is-beta: ${{ needs.get-version.outputs.is-beta }}
          version: ${{ needs.get-version.outputs.version }}
          target-commitish: ${{ needs.get-version.outputs.branch }}
