name: Publish NuGet Package

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      branch:
        required: true
        type: string
        description: 'The branch to build'
        default: 'main'
      version:
        required: true
        type: string
        description: 'The version to publish'

jobs:
  publish-nuget:
    name: Build and Publish NuGet Package
    runs-on: windows-latest
    permissions:
      id-token: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ inputs.branch }}

      - name: Build Macro Deck assembly
        run: |
            dotnet restore "src\MacroDeck\MacroDeck.csproj"
            dotnet build "src\MacroDeck\MacroDeck.csproj" -c Release -o "src\MacroDeck\bin\Release" -r win-x64
        shell: cmd

      - name: Setup NuGet
        uses: NuGet/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f

      - name: Pack NuGet package
        run: |
            nuget pack "src\MacroDeck\MacroDeck.nuspec" -BasePath "src\MacroDeck" -Version "${{ inputs.version }}" -OutputDirectory nupkg
        shell: cmd

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
            dotnet nuget push "nupkg\*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
        shell: cmd
